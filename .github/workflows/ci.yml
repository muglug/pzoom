name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build the release binaries once and share them with the jobs that need
  # them, so the (expensive) release compile only happens a single time.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pzoom
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: pzoom-binaries
          path: |
            target/release/pzoom
            target/release/pzoom-test
          if-no-files-found: error
          retention-days: 1

  # Unit tests compile their own test binaries, so they run independently of
  # the release build.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pzoom
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Unit tests
        run: cargo test --workspace

  # Build the playground WebAssembly package the way pages.yml deploys it and
  # actually run it, so a wasm-only runtime panic (e.g. an `Instant::now()` that
  # is unsupported on wasm32-unknown-unknown) fails CI instead of only breaking
  # pzoom.dev. Uses the nodejs target -- the same wasm binary as the browser's
  # `--target web` build, with glue that runs under Node.
  wasm-playground:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pzoom
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build playground WebAssembly package (nodejs target)
        run: wasm-pack build crates/pzoom-wasm --target nodejs --release --out-dir pkg-node

      - name: Smoke-test the playground engine
        run: node crates/pzoom-wasm/tests/playground_smoke.cjs crates/pzoom-wasm/pkg-node

  # Inference tests consume the prebuilt pzoom-test binary.
  inference-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout pzoom
        uses: actions/checkout@v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: pzoom-binaries
          path: target/release

      - name: Make binaries executable
        run: chmod +x target/release/pzoom target/release/pzoom-test

      - name: Inference tests
        run: ./target/release/pzoom-test --reuse-codebase

  # Documentation test consumes the prebuilt pzoom binary.
  documentation-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout pzoom
        uses: actions/checkout@v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: pzoom-binaries
          path: target/release

      - name: Make binaries executable
        run: chmod +x target/release/pzoom target/release/pzoom-test

      - name: Checkout Psalm (6.x)
        uses: actions/checkout@v4
        with:
          repository: vimeo/psalm
          ref: 6.x
          path: psalm

      - name: Documentation test (Psalm issue docs)
        run: python3 scripts/psalm_documentation_test.py --psalm-dir psalm
